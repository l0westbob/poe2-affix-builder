name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Validate committed JSON artifacts
        run: |
          find config result -name '*.json' -print0 | while IFS= read -r -d '' file; do
            python -m json.tool "$file" > /dev/null
          done
